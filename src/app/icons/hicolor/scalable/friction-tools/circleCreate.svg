<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 25 25" width="25" height="25">
  <!-- 椭圆工具 (圆形 + 辅助线) -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
    <!-- 椭圆 -->
    <ellipse cx="12.5" cy="12.5" rx="8" ry="8" stroke-width="1.5"/>
    <!-- 中心十字 -->
    <line x1="12.5" y1="6.5" x2="12.5" y2="18.5" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="6.5" y1="12.5" x2="18.5" y2="12.5" stroke-width="1" stroke-dasharray="2,2"/>
    <circle cx="12.5" cy="12.5" r="1.2" fill="#ffffff" stroke="none"/>
  </g>
</svg>
