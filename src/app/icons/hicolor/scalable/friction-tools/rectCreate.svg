<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 25 25" width="25" height="25">
  <!-- 形状/矩形工具 (圆角矩形 + 辅助线) -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
    <!-- 圆角矩形 -->
    <rect x="4" y="4" width="17" height="17" rx="2" stroke-width="1.5"/>
    <!-- 中心十字辅助线 -->
    <line x1="4" y1="12.5" x2="21" y2="12.5" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="12.5" y1="4" x2="12.5" y2="21" stroke-width="1" stroke-dasharray="2,2"/>
    <circle cx="12.5" cy="12.5" r="1.2" fill="#ffffff" stroke="none"/>
  </g>
</svg>
