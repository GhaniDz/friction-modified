<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 25 25" width="25" height="25">
  <!-- 局部变换轴 (坐标系箭头) -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5">
    <!-- 局部旋转弧 -->
    <path d="M14,4 C18,5 21,8.5 21,12.5"/>
    <path d="M14,4 L16.5,3.5 L15,6.5" fill="#ffffff" stroke="none"/>
    <!-- X 轴箭头 -->
    <line x1="4" y1="12.5" x2="18" y2="12.5"/>
    <line x1="18" y1="12.5" x2="15" y2="11"/>
    <line x1="18" y1="12.5" x2="15" y2="14"/>
    <!-- Y 轴箭头 -->
    <line x1="12.5" y1="21" x2="12.5" y2="7"/>
    <line x1="12.5" y1="7" x2="11" y2="10"/>
    <line x1="12.5" y1="7" x2="14" y2="10"/>
    <!-- 中心点 -->
    <circle cx="12.5" cy="12.5" r="1.5" fill="#ffffff" stroke="none"/>
  </g>
</svg>
