<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 25 25" width="25" height="25">
  <!-- 吸色工具 (滴管 + 色块) -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5">
    <!-- 滴管主体 -->
    <path d="M15,5 L20,10"/>
    <path d="M14,8 L17,11"/>
    <line x1="17" y1="7" x2="21" y2="3" stroke-width="1.2"/>
    <!-- 滴管头 -->
    <path d="M14,8 C13,9 11,11 10,12 C9,13 9.5,14 10.5,14.5 C11,14.8 11.5,14.5 12,14 L14,12 L12,10"/>
    <!-- 颜料滴 -->
    <path d="M5,17 C5,15 7,15 7,17 C7,18 6,19 6,19 C6,19 5,18 5,17 Z" fill="#ffffff" stroke="none"/>
    <!-- 色板 -->
    <rect x="4" y="20" width="17" height="3" rx="1" fill="#ffffff" stroke="none" opacity="0.3"/>
  </g>
</svg>
