<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 25 25" width="25" height="25">
  <!-- 空对象工具 (虚线框 + 中心点) -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
    <!-- 虚线框 -->
    <rect x="4" y="4" width="17" height="17" rx="1.5" stroke-dasharray="3,2" stroke-width="1.3"/>
    <!-- 中心饼图/空标记 -->
    <circle cx="12.5" cy="12.5" r="5" stroke-width="1.3"/>
    <line x1="12.5" y1="7.5" x2="12.5" y2="17.5" stroke-width="1"/>
    <line x1="7.5" y1="12.5" x2="17.5" y2="12.5" stroke-width="1"/>
    <circle cx="12.5" cy="12.5" r="1.5" fill="#ffffff" stroke="none"/>
  </g>
</svg>
