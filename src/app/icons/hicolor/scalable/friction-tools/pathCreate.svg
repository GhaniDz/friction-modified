<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 25 25" width="25" height="25">
  <!-- 钢笔工具 (钢笔 + 路径) -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5">
    <!-- 钢笔笔尖 -->
    <path d="M6,19 L11,6 L13,8 L8,21 Z" fill="#ffffff" stroke="none"/>
    <circle cx="11.5" cy="7" r="1.5" fill="#ffffff" stroke="none"/>
    <!-- 曲线路径 -->
    <path d="M13,14 C16,10 19,12 21,9" stroke-width="1.3"/>
    <!-- 路径上的锚点 -->
    <circle cx="13" cy="14" r="1.2" fill="#ffffff"/>
    <circle cx="21" cy="9" r="1.2" fill="#ffffff"/>
  </g>
</svg>
