<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 25 25" width="25" height="25">
  <!-- 选择/变换工具 (箭头 + 虚线框) -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
    <!-- 箭头光标 -->
    <path d="M4,4 L4,12 L6.5,9.5 L9,14 L10.5,13 L8,8.5 L11,8.5 Z" fill="#ffffff" stroke="none"/>
    <!-- 虚线选择框 -->
    <rect x="11" y="11" width="10" height="10" rx="1" stroke-dasharray="2,1.5" stroke-width="1.3"/>
  </g>
</svg>
