<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 25 25" width="25" height="25">
  <!-- 锚点工具 (钢笔尖 + 十字) -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5">
    <!-- 钢笔尖形状 -->
    <path d="M12.5,21 L7,4 L12.5,9 L18,4 Z" fill="#ffffff" stroke="none"/>
    <circle cx="12.5" cy="9" r="1.8" fill="#ffffff" stroke="none"/>
    <!-- 十字锚点 -->
    <line x1="12.5" y1="14" x2="12.5" y2="20"/>
    <line x1="8.5" y1="17" x2="16.5" y2="17"/>
  </g>
</svg>
